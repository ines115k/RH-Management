server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Toutes les requêtes vers /api/ sont redirigées vers le backend Django
    location /api/ {
        proxy_pass https://rh-management-kky3.onrender.com/api/;
        proxy_set_header Host rh-management-kky3.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tout le reste va vers React (gestion du SPA comme avant)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
