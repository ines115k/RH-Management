name: CI/CD Pipeline - RH-Management

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-backend:
    name: Test Backend (Django)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances backend
        run: |
          cd backend
          pip install -r requirements.txt

      - name: ✅ Vérifier que Django peut démarrer
        run: |
          cd backend
          python manage.py check

  test-frontend:
    name: Test Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 📦 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances frontend
        run: |
          cd frontend
          npm install

      - name: ✅ Construire le frontend
        run: |
          cd frontend
          npm run build

  build-and-deploy:
    name: Build, Push & Deploy avec Docker
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🐳 Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Construire et pousser le backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rh-backend:latest

      - name: 🏗️ Construire et pousser le frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rh-frontend:latest

      - name: 📋 Lister les images poussées
        run: |
          echo "✅ Images poussées avec succès !"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/rh-backend:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/rh-frontend:latest"
     - name: 🚀 Déclencher le déploiement Render (backend)
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

     - name: 🚀 Déclencher le déploiement Render (frontend)
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
